# yaml-language-server: $schema=./compose-spec.json
version: "3.9"

services:
    consul:
        image: harbor.pihcm.tech/tools/consul:1.15.4
        restart: always
        container_name: consul
        ports:
            - "${CONSUL_PORT}:8500"
        command: >
            consul agent -server -ui -node=server-1 -bootstrap-expect=1 -client=0.0.0.0 -data-dir consul/data
        volumes:
            - ${CONSUL_DATA}:/consul/data
        networks:
            - seed

networks:
    seed:
        name: seed
        driver: bridge
